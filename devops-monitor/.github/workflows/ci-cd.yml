name: CI/CD - DevOps Monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install black flake8 pytest pytest-cov

      - name: Lint
        run: |
          black --check api/ dashboard/ tests/
          flake8 api/ dashboard/ tests/ --max-line-length=100

      - name: Tests
        env:
          DISABLE_POLL_LOOP: "1"
        run: pytest tests/ -v --cov=api --cov-fail-under=75

  build-and-push:
    name: Build and Push Images
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push API image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/devops-monitor-api:${{ github.sha }} -f api/Dockerfile .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/devops-monitor-api:${{ github.sha }}

      - name: Build and Push Dashboard image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/devops-monitor-dashboard:${{ github.sha }} -f dashboard/Dockerfile .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/devops-monitor-dashboard:${{ github.sha }}

  deploy:
    name: Deploy to Azure Container Apps
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy API
        run: |
          az containerapp update \
            --name ${{ secrets.API_APP_NAME }} \
            --resource-group ${{ secrets.RG_NAME }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/devops-monitor-api:${{ github.sha }}

      - name: Deploy Dashboard
        run: |
          az containerapp update \
            --name ${{ secrets.DASHBOARD_APP_NAME }} \
            --resource-group ${{ secrets.RG_NAME }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/devops-monitor-dashboard:${{ github.sha }}
