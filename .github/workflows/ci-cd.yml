name: CI/CD - DevOps Monitor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r devops-monitor/requirements.txt

      - name: Lint
        run: |
          black --check devops-monitor/api/ devops-monitor/dashboard/ devops-monitor/tests/
          flake8 devops-monitor/api/ devops-monitor/dashboard/ devops-monitor/tests/ --max-line-length=100

      - name: Tests
        env:
          DISABLE_POLL_LOOP: "1"
        run: pytest devops-monitor/tests/ -v --cov=devops-monitor/api --cov-fail-under=75